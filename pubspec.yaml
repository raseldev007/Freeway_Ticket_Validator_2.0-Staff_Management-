name: shohagh_ticket_validator
description: "Internal ticket validation app for Shohagh Paribahan staff."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.4.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8
  google_fonts: ^8.0.2
  font_awesome_flutter: ^10.7.0
  flutter_svg: ^2.1.0
  provider: ^6.1.5
  mobile_scanner: ^7.2.0
  permission_handler: ^12.0.1
  intl: ^0.20.2
  flutter_animate: ^4.5.2
  firebase_core: ^3.10.1
  firebase_auth: ^5.4.1
  firebase_messaging: ^15.2.1
  firebase_crashlytics: ^4.3.1
  cloud_firestore: ^5.6.1
  flutter_local_notifications: ^18.0.1
  http: ^1.6.0
  shared_preferences: ^2.3.3
  encrypt: ^5.0.3
  convert: ^3.1.2
  audioplayers: ^6.1.0
  connectivity_plus: ^7.1.1
  in_app_update: ^4.0.5
  sqflite: ^2.4.2+1
  path_provider: ^2.1.5
  path: ^1.9.1
  shimmer: ^3.0.0
  package_info_plus: ^10.1.0
  device_preview: ^1.2.0
  flutter_screenutil: ^5.9.3

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.4
  flutter_native_splash: ^2.4.7

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/images/app_launcher_icon.png"
  remove_alpha_ios: true
  adaptive_icon_background: "#A03E2B"
  adaptive_icon_foreground: "assets/images/app_launcher_icon.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/logo.png
    - assets/images/background.jpg
    - assets/images/app_launcher_icon.png

